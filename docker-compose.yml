# =============================================================================
# VideoSphere — Docker Compose
# =============================================================================
# Run the Next.js app in a container. For local development you typically run
# the app on the host (pnpm dev) and only Appwrite in Docker — see
# docs/docker-appwrite-setup.md for Appwrite.
#
# Build and run app:  docker compose up -d
# Stop:               docker compose down
# =============================================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: videosphere-app:latest
    container_name: videosphere-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env.local
    # Uncomment to talk to Appwrite in another container or on host:
    # environment:
    #   - NEXT_PUBLIC_APPWRITE_ENDPOINT=http://appwrite/v1
    #   # Or use host.docker.internal for Docker Desktop talking to host:
    #   - NEXT_PUBLIC_APPWRITE_ENDPOINT=http://host.docker.internal:80/v1
